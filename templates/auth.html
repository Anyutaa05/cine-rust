<!DOCTYPE html>

<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід та Реєстрація - CineRust</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #141414;
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      color: #e50914;
      letter-spacing: 3px;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    .auth-container {
      background: #222;
      padding: 30px 25px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 1px solid #444;
    }

    .tab {
      flex: 1;
      padding: 12px;
      cursor: pointer;
      text-align: center;
      color: #888;
      transition: 0.3s;
      font-size: 1rem;
    }

    .tab.active {
      color: white;
      border-bottom: 3px solid #e50914;
      font-weight: bold;
    }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    h2 {
      margin-bottom: 20px;
      color: #e50914;
      text-align: center;
      font-size: 1.4rem;
    }

    input {
      width: 100%;
      height: 50px; /* Фіксована висота, щоб дата не була меншою за текст */
      padding: 0 16px; /* Відступи тільки по боках */
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: white;
      font-size: 1rem;
      appearance: none; /* Прибирає системні стилі iOS/Android */
      -webkit-appearance: none;
      display: block;
    }

    /* Спеціальний фікс для поля дати */
    input[type="date"] {
      font-family: inherit; /* Щоб шрифт не мінявся на системний */
      line-height: 50px; /* Вирівнює текст по центру висоти */
    }

    /* Щоб іконка календаря в Chrome/Android була білою або не ламала розмір */
    ::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }


    input:focus {
      outline: none;
      border-color: #e50914;
    }

    label {
      font-size: 0.85rem;
      color: #888;
      margin-top: 8px;
      display: block;
    }

    .alert {
      background: rgba(229, 9, 20, 0.2);
      border: 1px solid #e50914;
      color: #ff9494;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }

    button {
      background: #e50914;
      color: white;
      border: none;
      width: 100%;
      padding: 15px;
      cursor: pointer;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      margin-top: 15px;
      transition: 0.2s;
      letter-spacing: 1px;
    }

    button:hover { background: #ff0a16; }
    button:active { transform: scale(0.98); }

    .footer-link {
      display: block;
      margin-top: 20px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      text-align: center;
    }

    .footer-link:hover { color: white; }

  </style>
</head>
<body>

<div class="logo">🎬 CineRust</div>

<div class="auth-container">
  <div id="error-alert" class="alert"></div>

  <div class="tabs">
    <div id="tab-login" class="tab active" onclick="showForm('login', this)">Вхід</div>
    <div id="tab-register" class="tab" onclick="showForm('register', this)">Реєстрація</div>
  </div>

  <div id="login-form" class="auth-form active">
    <h2>З поверненням 👋</h2>
    <form action="/login" method="post">
      <input type="text" name="username" placeholder="Ваш нікнейм" required autocomplete="username">
      <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password">
      <button type="submit">УВІЙТИ</button>
    </form>
  </div>

  <div id="register-form" class="auth-form">
    <h2>Створити акаунт ✨</h2>
    <form action="/register" method="post">
      <input type="text" name="username" placeholder="Логін" required autocomplete="username">
      <input type="password" name="password" placeholder="Пароль" required autocomplete="new-password">
      <label for="birthday">Дата народження (необов'язково)</label>
      <input type="date" id="birthday" name="birthday">
      <input type="url" name="avatar_url" placeholder="URL аватарки (необов'язково)">
      <button type="submit">ЗАРЕЄСТРУВАТИСЯ</button>
    </form>
  </div>

  <a href="/" class="footer-link">← На головну</a>

</div>

<script>
  function showForm(type, tabElement) {
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(type + '-form').classList.add('active');
    tabElement.classList.add('active');
    document.getElementById('error-alert').style.display = 'none';
  }

  const urlParams = new URLSearchParams(window.location.search);
  const errorAlert = document.getElementById('error-alert');

  if (urlParams.get('error') === 'exists') {
    errorAlert.innerText = "Цей нікнейм уже зайнятий!";
    errorAlert.style.display = 'block';
    showForm('register', document.getElementById('tab-register'));
  } else if (urlParams.get('error') === 'login') {
    errorAlert.innerText = "Невірний логін або пароль!";
    errorAlert.style.display = 'block';
  } else if (urlParams.get('status') === 'registered') {
    errorAlert.innerText = "Успіх! Тепер увійдіть.";
    errorAlert.style.background = "rgba(46, 204, 113, 0.2)";
    errorAlert.style.borderColor = "#2ecc71";
    errorAlert.style.color = "#2ecc71";
    errorAlert.style.display = 'block';
  }
</script>

</body>
</html>
