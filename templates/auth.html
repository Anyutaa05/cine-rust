<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Вхід та Реєстрація - CineRust</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #141414;
      color: white;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      color: #e50914;
      letter-spacing: 3px;
      margin-bottom: 30px;
      text-transform: uppercase;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .auth-container {
      background: #222;
      padding: 30px 25px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }

    .tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 1px solid #444;
    }

    .tab {
      flex: 1;
      padding: 15px;
      cursor: pointer;
      text-align: center;
      color: #888;
      transition: 0.3s;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tab.active {
      color: white;
      border-bottom: 3px solid #e50914;
      font-weight: bold;
    }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    h2 {
      margin-bottom: 20px;
      color: #fff;
      text-align: center;
      font-size: 1.4rem;
    }

    input {
      width: 100%;
      height: 54px;
      padding: 0 16px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      font-size: 16px; /* 16px запобігає авто-зуму на iOS */
      transition: 0.3s;
      outline: none;
    }

    input:focus {
      border-color: #e50914;
      background: #252525;
    }

    /* Стилізація календаря */
    input[type="date"] {
      font-family: inherit;
      color-scheme: dark; /* Робить системний календар темним */
    }

    label {
      font-size: 0.8rem;
      color: #aaa;
      margin: 10px 0 2px 4px;
      display: block;
      text-transform: uppercase;
    }

    .alert {
      background: rgba(229, 9, 20, 0.15);
      border: 1px solid #e50914;
      color: #ff9494;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      text-align: center;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    button {
      background: #e50914;
      color: white;
      border: none;
      width: 100%;
      padding: 16px;
      cursor: pointer;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1rem;
      margin-top: 15px;
      transition: 0.2s;
      text-transform: uppercase;
    }

    button:hover { background: #b20710; }
    button:active { transform: scale(0.97); }

    .footer-link {
      display: block;
      margin-top: 25px;
      color: #666;
      text-decoration: none;
      font-size: 0.9rem;
      text-align: center;
      transition: 0.3s;
    }

    .footer-link:hover { color: #e50914; }

    /* Адаптація для зовсім малих екранів */
    @media (max-width: 380px) {
      .auth-container { padding: 20px 15px; }
      .logo { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="logo">🎬 CineRust</div>

<div class="auth-container">
  <div id="error-alert" class="alert"></div>

  <div class="tabs">
    <div id="tab-login" class="tab active" onclick="showForm('login', this)">Вхід</div>
    <div id="tab-register" class="tab" onclick="showForm('register', this)">Реєстрація</div>
  </div>

  <div id="login-form" class="auth-form active">
    <h2>З поверненням 👋</h2>
    <form action="/login" method="post" accept-charset="UTF-8">
      <input type="text" name="username" placeholder="Ваш нікнейм" required autocomplete="username">
      <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password">
      <button type="submit">УВІЙТИ</button>
    </form>
  </div>

  <div id="register-form" class="auth-form">
    <h2>Створити акаунт ✨</h2>
    <form action="/register" method="post" accept-charset="UTF-8">
      <input type="text" name="username" placeholder="Логін" required autocomplete="username">
      <input type="password" name="password" placeholder="Пароль" required autocomplete="new-password">

      <label for="birthday">Дата народження</label>
      <input type="date" id="birthday" name="birthday">

      <label for="avatar">URL аватарки</label>
      <input type="url" id="avatar" name="avatar_url" placeholder="https://image.com/photo.jpg">

      <button type="submit">ЗАРЕЄСТРУВАТИСЯ</button>
    </form>
  </div>

  <a href="/" class="footer-link">← На головну сторінку</a>

</div>

<script>
  function showForm(type, tabElement) {
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(type + '-form').classList.add('active');
    tabElement.classList.add('active');
    document.getElementById('error-alert').style.display = 'none';
  }

  const urlParams = new URLSearchParams(window.location.search);
  const errorAlert = document.getElementById('error-alert');

  if (urlParams.get('error') === 'exists') {
    errorAlert.innerText = "Цей нікнейм уже зайнятий!";
    errorAlert.style.display = 'block';
    showForm('register', document.getElementById('tab-register'));
  } else if (urlParams.get('error') === 'login') {
    errorAlert.innerText = "Невірний логін або пароль!";
    errorAlert.style.display = 'block';
  } else if (urlParams.get('status') === 'registered') {
    errorAlert.innerText = "Успіх! Тепер увійдіть.";
    errorAlert.style.background = "rgba(46, 204, 113, 0.15)";
    errorAlert.style.borderColor = "#2ecc71";
    errorAlert.style.color = "#2ecc71";
    errorAlert.style.display = 'block';
    showForm('login', document.getElementById('tab-login'));
  }
</script>

</body>
</html>
