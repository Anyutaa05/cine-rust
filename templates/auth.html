<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Вхід та Реєстрація - CineRust</title>
  <style>
    body { background: #141414; color: white; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .auth-container { background: #222; padding: 40px; border-radius: 12px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    h2 { margin-bottom: 20px; color: #e50914; text-align: center; }

    .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #444; }
    .tab { flex: 1; padding: 10px; cursor: pointer; text-align: center; color: #888; transition: 0.3s; }
    .tab.active { color: white; border-bottom: 3px solid #e50914; font-weight: bold; }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #333; color: white; box-sizing: border-box; }
    input:focus { outline: none; border-color: #e50914; }
    label { font-size: 0.8rem; color: #888; margin-left: 2px; }

    .alert { background: rgba(229, 9, 20, 0.2); border: 1px solid #e50914; color: #ff9494; padding: 10px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 20px; text-align: center; display: none; }

    button { background: #e50914; color: white; border: none; width: 100%; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
    button:hover { background: #ff0a16; }

    .footer-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; text-align: center; }
    .footer-link:hover { color: white; }
  </style>
</head>
<body>

<div class="auth-container">
  <div id="error-alert" class="alert"></div>

  <div class="tabs">
    <div id="tab-login" class="tab active" onclick="showForm('login', this)">Вхід</div>
    <div id="tab-register" class="tab" onclick="showForm('register', this)">Реєстрація</div>
  </div>

  <div id="login-form" class="auth-form active">
    <h2>З поверненням</h2>
    <form action="/login" method="post">
      <input type="text" name="username" placeholder="Ваш нікнейм" required>
      <input type="password" name="password" placeholder="Пароль" required>
      <button type="submit">УВІЙТИ</button>
    </form>
  </div>

  <div id="register-form" class="auth-form">
    <h2>Створити акаунт</h2>
    <form action="/register" method="post">
      <input type="text" name="username" placeholder="Логін" required>
      <input type="password" name="password" placeholder="Пароль" required>

      <label for="birthday">Дата народження (необов'язково)</label>
      <input type="date" id="birthday" name="birthday">

      <input type="url" name="avatar_url" placeholder="URL аватарки (необов'язково)">
      <button type="submit">ЗАРЕЄСТРУВАТИСЯ</button>
    </form>
  </div>

  <a href="/" class="footer-link">← На головну</a>
</div>

<script>
  function showForm(type, tabElement) {
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    document.getElementById(type + '-form').classList.add('active');
    tabElement.classList.add('active');
    // При перемиканні ховаємо старі помилки
    document.getElementById('error-alert').style.display = 'none';
  }

  // ОБРОБКА СТАТУСІВ З URL
  const urlParams = new URLSearchParams(window.location.search);
  const errorAlert = document.getElementById('error-alert');

  if (urlParams.get('error') === 'exists') {
    errorAlert.innerText = "Цей нікнейм уже зайнятий!";
    errorAlert.style.display = 'block';
    showForm('register', document.getElementById('tab-register'));
  } else if (urlParams.get('error') === 'login') {
    errorAlert.innerText = "Невірний логін або пароль!";
    errorAlert.style.display = 'block';
  } else if (urlParams.get('status') === 'registered') {
    errorAlert.innerText = "Успіх! Тепер увійдіть.";
    errorAlert.style.background = "rgba(46, 204, 113, 0.2)";
    errorAlert.style.borderColor = "#2ecc71";
    errorAlert.style.color = "#2ecc71";
    errorAlert.style.display = 'block';
  }
</script>

</body>
</html>
